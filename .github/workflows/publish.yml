name: Publish VS Code Extension

on:
  push:
    tags:
      - "v*"
      - "b*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          tag_version="${tag:1}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ -z "$tag_version" ]]; then
            echo "Tag '${tag}' must include a version after the channel prefix."
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version '${tag_version}' does not match package.json version '${package_version}'."
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Package stable targets
        if: startsWith(github.ref_name, 'v')
        run: pnpm run package:all

      - name: Package preview targets
        if: startsWith(github.ref_name, 'b')
        run: pnpm run package:all:pre-release

      - name: Publish stable release
        if: startsWith(github.ref_name, 'v')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath *.vsix

      - name: Publish preview release
        if: startsWith(github.ref_name, 'b')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --pre-release --packagePath *.vsix
